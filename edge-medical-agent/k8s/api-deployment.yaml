apiVersion: apps/v1
kind: Deployment
metadata:
  name: triage-api
  namespace: medgemma-triage
  labels:
    app: triage-api
    component: api
spec:
  replicas: 2  # Can scale API horizontally
  selector:
    matchLabels:
      app: triage-api
  template:
    metadata:
      labels:
        app: triage-api
        component: api
    spec:
      hostNetwork: false  # API doesn't need host network
      containers:
      - name: api
        image: medgemma-triage:latest
        imagePullPolicy: Never
        command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: triage-config
        - secretRef:
            name: triage-secrets
        env:
        - name: COMPONENT
          value: "api"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: triage-api
  namespace: medgemma-triage
spec:
  type: NodePort
  selector:
    app: triage-api
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30800
